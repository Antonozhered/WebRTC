<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceship Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameArea {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #00ff00;
            background-image: url('./assets/gameArea_background.png');
            background-size: cover;
        }

        #spaceship {
            position: absolute;
            bottom: 30px;
            left: 375px;
            /* center - 25px for 50px width */
            width: 90px;
            height: 100px;
            transition: left 0.1s ease;
        }

        .status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-family: monospace;
            font-size: 14px;
            z-index: 10;
        }

        .hidden {
            display: none;
        }

        #startButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            background: #e94560;
            color: #fff;
            border: 2px solid #ff6b7a;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 100;
        }

        #startButton:hover {
            background: #ff6b7a;
            box-shadow: 0 0 20px #e94560;
        }

        #startButton:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        #startButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #endScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            padding: 40px;
            border: 2px solid #00ff00;
            border-radius: 10px;
            text-align: center;
            z-index: 200;
            font-family: monospace;
        }

        #cameraBox {
            position: relative;
            margin: 10px auto;
            width: 120px;
            height: 120px;
            border: 2px solid #00ff00;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        #playerCamera {
            width: 120px;
            height: 120px;
            object-fit: cover;
        }

        #endScreen h2 {
            margin: 0 0 20px 0;
            font-size: 36px;
        }

        #endScreen p {
            margin: 10px 0;
            font-size: 18px;
        }

        #playAgain {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background: #e94560;
            color: #fff;
            border: 2px solid #ff6b7a;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #playAgain:hover {
            background: #ff6b7a;
            box-shadow: 0 0 20px #e94560;
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"
        integrity="sha512-0f7Ahsuvr+/P2btTY4mZIw9Vl23lS6LY/Y7amdkmUg2dqsUF+cTe4QjWvj/NIBHJoGksOiqndKQuI9yzn2hB0g=="

    <script>
        const spaceship = document.getElementById('spaceship');
        const gameArea = document.getElementById('gameArea');
        const status = document.getElementById('status');
        const startButton = document.getElementById('startButton');
        const qrDiv = document.getElementById('qr');
        const endScreen = document.getElementById('endScreen');
        const playerCamera = document.getElementById('playerCamera');
        const finalScore = document.getElementById('finalScore');
        const finalWave = document.getElementById('finalWave');
        const playAgainButton = document.getElementById('playAgain');

        let peer;
        let senderId;
        let gameStarted = false;

        // Game state
        let spaceshipState = {
            x: 375,
            y: 540,
            width: 90,
            height: 70,
            alive: true,
            cooldown: 0,
            shieldActive: false,
            shieldTimer: 0,
            shieldCooldown: 0
        };

        let aliens = [];
        let playerBullets = [];
        let alienBullets = [];

        let score = 0;
        let wave = 1;
        let gameOver = false;

        let alienDirection = 1;
        let alienSpeed = 0.8;
        let dropDistance = 20;

        // Alien configurations: red (top, fastest), green (middle), blue (bottom, slowest)
        const alienConfigs = [
            { color: '#EE1B1B', shootRate: 0.8, row: 0 },  // Red: fastest
            { color: '#1BEE29', shootRate: 0.5, row: 1 },  // Green: moderate
            { color: '#008CFF', shootRate: 0.3, row: 2 }   // Blue: slowest
        ];

        const ALIEN_WIDTH = 60;
        const ALIEN_HEIGHT = 55;
        const ALIEN_SPACING = 60 + 32; // 60 width + 32 spacing
        const ROW_SPACING = 55 + 16; // 55 height + 16 spacing
        const ALIEN_START_X = 50;
        const ALIEN_START_Y = 50;

        // Initialize aliens with properties
        function initializeAliens() {
            aliens = [];
            let alienId = 0;

            alienConfigs.forEach((config) => {
                for (let i = 0; i < 7; i++) {
                    aliens.push({
                        id: alienId++,
                        x: ALIEN_START_X + (i * ALIEN_SPACING),
                        y: ALIEN_START_Y + (config.row * ROW_SPACING),
                        width: ALIEN_WIDTH,
                        height: ALIEN_HEIGHT,
                        color: config.color,
                        row: config.row,
                        shootRate: config.shootRate,  // 0.8 (red), 0.5 (green), 0.3 (blue)
                        alive: true
                    });
                }
            });

            console.log(`Initialized ${aliens.length} aliens`);
        }

        // Collision helper
        const isColliding = (a, b) => {
            return (
                a.x < b.x + b.width &&
                a.x + a.width > b.x &&
                a.y < b.y + b.height &&
                a.y + a.height > b.y
            );
        };

        // Player bullet functions
        const shootPlayerBullet = () => {
            if (!spaceshipState.alive || gameOver || spaceshipState.cooldown > 0 || spaceshipState.shieldActive) return;

            playerBullets.push({
                x: spaceshipState.x + (spaceshipState.width / 2),
                y: spaceshipState.y,
                width: 6,
                height: 14,
                speed: 8,
                active: true
            });
            spaceshipState.cooldown = 15;
        };

        const updatePlayerBullets = () => {
            playerBullets.forEach(bullet => {
                if (bullet.active) {
                    bullet.y -= bullet.speed;
                    if (bullet.y < -bullet.height) {
                        bullet.active = false;
                    }
                }
            });
        };

        const renderPlayerBullets = () => {
            const container = document.getElementById('bullet__container');

            playerBullets.forEach(bullet => {
                if (bullet.active) {
                    const bulletDiv = document.createElement('div');
                    bulletDiv.className = 'bullet player-bullet';
                    bulletDiv.style.position = 'absolute';
                    bulletDiv.style.left = `${bullet.x}px`;
                    bulletDiv.style.top = `${bullet.y}px`;
                    bulletDiv.style.width = `${bullet.width}px`;
                    bulletDiv.style.height = `${bullet.height}px`;
                    bulletDiv.style.background = '#00ff00';
                    container.appendChild(bulletDiv);
                }
            });
        };

        // Alien functions
        const updateAliens = () => {
            if (!aliens.length) return;

            // Move all aliens horizontally
            const aliveAliens = aliens.filter(alien => alien.alive);
            aliveAliens.forEach(alien => {
                alien.x += alienSpeed * alienDirection;
            });

            // Check for edge collision
            const leftmost = Math.min(...aliveAliens.map(alien => alien.x));
            const rightmost = Math.max(...aliveAliens.map(alien => alien.x + alien.width));

            if ((alienDirection === 1 && rightmost >= 800) || (alienDirection === -1 && leftmost <= 0)) {
                alienDirection *= -1;
                aliveAliens.forEach(alien => {
                    alien.y += dropDistance;
                });
            }
        };

        // Alien shooting functions
        const getBottomAliens = () => {
            const bottomAliens = [];
            for (let col = 0; col < 7; col++) {
                const columnAliens = aliens.filter(alien =>
                    alien.alive && Math.floor((alien.x - ALIEN_START_X) / ALIEN_SPACING) === col
                );
                if (columnAliens.length > 0) {
                    const bottomAlien = columnAliens.reduce((bottom, current) =>
                        current.y > bottom.y ? current : bottom
                    );
                    bottomAliens.push(bottomAlien);
                }
            }
            return bottomAliens;
        };

        const alienShoot = () => {
            if (Math.random() < 0.02) { // 2% chance per frame
                const bottomAliens = getBottomAliens();
                if (bottomAliens.length > 0) {
                    const shooter = bottomAliens[Math.floor(Math.random() * bottomAliens.length)];
                    alienBullets.push({
                        x: shooter.x + 25,
                        y: shooter.y + 55,
                        width: 6,
                        height: 14,
                        speed: 4,
                        active: true
                    });
                }
            }
        };

        const updateAlienBullets = () => {
            alienBullets.forEach(bullet => {
                if (bullet.active) {
                    bullet.y += bullet.speed;
                    if (bullet.y > 600) {
                        bullet.active = false;
                    }
                }
            });
        };

        const renderAlienBullets = () => {
            const container = document.getElementById('bullet__container');

            alienBullets.forEach(bullet => {
                if (bullet.active) {
                    const bulletDiv = document.createElement('div');
                    bulletDiv.className = 'bullet alien-bullet';
                    bulletDiv.style.position = 'absolute';
                    bulletDiv.style.left = `${bullet.x}px`;
                    bulletDiv.style.top = `${bullet.y}px`;
                    bulletDiv.style.width = `${bullet.width}px`;
                    bulletDiv.style.height = `${bullet.height}px`;
                    bulletDiv.style.background = '#ff0000';
                    container.appendChild(bulletDiv);
                }
            });
        };

        // Collision checks
        const checkPlayerBulletAlienCollisions = () => {
            playerBullets.forEach(bullet => {
                if (!bullet.active) return;

                aliens.forEach(alien => {
                    if (!alien.alive) return;

                    if (isColliding(bullet, alien)) {
                        alien.alive = false;
                        bullet.active = false;

                        // Score based on row
                        if (alien.row === 0) score += 30; // Red
                        else if (alien.row === 1) score += 20; // Green
                        else if (alien.row === 2) score += 10; // Blue
                    }
                });
            });
        };

        const checkAlienSpaceshipCollision = () => {
            if (!spaceshipState.alive) return;

            const gameRect = gameArea.getBoundingClientRect();
            const shipRect = spaceship.getBoundingClientRect();
            const shipCollider = {
                x: shipRect.left - gameRect.left,
                y: shipRect.top - gameRect.top,
                width: shipRect.width,
                height: shipRect.height
            };

            // Check if any alien reached the spaceship level
            const lowestAlien = aliens
                .filter(alien => alien.alive)
                .reduce((lowest, current) => current.y > lowest.y ? current : lowest, { y: 0 });

            if (lowestAlien.y + lowestAlien.height >= shipCollider.y) {
                killSpaceship();
                return;
            }

            // Check alien bullet collisions
            alienBullets.forEach(bullet => {
                if (bullet.active && isColliding(bullet, shipCollider)) {
                    bullet.active = false;
                    if (!spaceshipState.shieldActive) {
                        killSpaceship();
                    }
                }
            });

            // Check direct alien to spaceship rectangle collision
            aliens.forEach(alien => {
                if (alien.alive && isColliding(alien, shipCollider)) {
                    killSpaceship();
                }
            });
        };

        // Death and game over
        const killSpaceship = () => {
            spaceshipState.alive = false;
            gameOver = true;
            spaceship.style.display = 'none';
        };

        const startNextWave = () => {
            if (aliens.every(alien => !alien.alive)) {
                wave++;
                alienSpeed += 0.2;
                initializeAliens();
                renderAliens();
            }
        };

        // Game loop
        const updateGame = () => {
            if (!gameStarted || gameOver) return;

            // Update state
            spaceshipState.cooldown = Math.max(0, spaceshipState.cooldown - 1);
            if (spaceshipState.shieldActive) {
                spaceshipState.shieldTimer = Math.max(0, spaceshipState.shieldTimer - 1);
                if (spaceshipState.shieldTimer === 0) {
                    spaceshipState.shieldActive = false;
                }
            }
            if (spaceshipState.shieldCooldown > 0) {
                spaceshipState.shieldCooldown = Math.max(0, spaceshipState.shieldCooldown - 1);
            }

            updateAliens();
            updatePlayerBullets();
            updateAlienBullets();
            alienShoot();

            // Check collisions
            checkPlayerBulletAlienCollisions();
            checkAlienSpaceshipCollision();

            // Check for next wave
            startNextWave();
        };

        const renderSpaceship = () => {
            spaceship.style.left = spaceshipState.x + 'px';
            if (spaceshipState.shieldActive) {
                spaceship.style.boxShadow = '0 0 25px 10px rgba(0, 255, 0, 0.8), inset 0 0 15px rgba(0,255,0,0.8)';
                spaceship.style.borderRadius = '50%';
            } else {
                spaceship.style.boxShadow = '';
                spaceship.style.borderRadius = '';
            }
        };

        const renderGame = () => {
            if (!gameStarted) return;

            const bulletContainer = document.getElementById('bullet__container');
            bulletContainer.innerHTML = '';

            renderSpaceship();
            renderAliens();
            renderPlayerBullets();
            renderAlienBullets();
        };

        const cleanState = () => {
            playerBullets = playerBullets.filter(bullet => bullet.active);
            alienBullets = alienBullets.filter(bullet => bullet.active);
        };

        const gameLoop = () => {
            updateGame();
            cleanState();
            renderGame();

            if (gameOver) {
                showEndScreen();
                return;
            }

            requestAnimationFrame(gameLoop);
        };

        const requestLocalCamera = async () => {
            console.log('Requesting local camera for end screen...');
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.warn('No camera API available');
                showCameraFallback('No camera API');
                return;
            }

            try {
                console.log('Requesting camera permission...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 120 },
                        height: { ideal: 120 },
                        facingMode: 'user' // Prefer front camera on mobile
                    },
                    audio: false
                });
                console.log('Camera stream obtained successfully');
                playerCamera.srcObject = stream;
                playerCamera.style.display = 'block';
                await playerCamera.play();
                console.log('Camera playing in end screen');
            } catch (err) {
                console.error('Camera access failed:', err);
                let message = 'Camera denied';
                if (err.name === 'NotAllowedError') {
                    message = 'Permission denied';
                } else if (err.name === 'NotFoundError') {
                    message = 'No camera found';
                } else if (err.name === 'NotReadableError') {
                    message = 'Camera in use';
                }
                showCameraFallback(message);
            }
        };

        const showCameraFallback = (message) => {
            const cameraBox = document.getElementById('cameraBox');
            playerCamera.style.display = 'none';
            cameraBox.innerHTML += `<div style="position:absolute; top:0; left:0; width:120px; height:120px; background:#333; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; text-align:center; border-radius:8px;">${message}</div>`;
        };

        const showEndScreen = () => {
            endScreen.classList.remove('hidden');
            finalScore.textContent = `Final Score: ${score}`;
            finalWave.textContent = `Wave Reached: ${wave}`;

            // Try to use sender's camera stream from peer connection
            if (peer && peer.streams && peer.streams.length > 0) {
                console.log('Using sender camera stream for end screen');
                playerCamera.srcObject = peer.streams[0];
                playerCamera.play().catch(() => { });
            } else if (!playerCamera.srcObject) {
                // Fallback: request local camera if no sender stream available
                console.log('No sender camera stream, requesting local camera');
                requestLocalCamera();
            }
        };

        const resetGame = () => {
            spaceshipState = {
                x: 375,
                y: 540,
                width: 90,
                height: 70,
                alive: true,
                cooldown: 0,
                shieldActive: false,
                shieldTimer: 0,
                shieldCooldown: 0
            };
            aliens = [];
            playerBullets = [];
            alienBullets = [];
            score = 0;
            wave = 1;
            gameOver = false;
            alienDirection = 1;
            alienSpeed = 1;

            spaceship.style.left = spaceshipState.x + 'px';
            spaceship.style.display = 'block';

            endScreen.classList.add('hidden');
            gameArea.classList.remove('hidden');

            initializeAliens();
            renderAliens();
            gameLoop();
        };

        const moveSpaceship = (direction) => {
            if (!spaceshipState.alive || gameOver) return;

            if (direction === 'left' && spaceshipState.x > 0) {
                spaceshipState.x -= 35;
            } else if (direction === 'right' && spaceshipState.x < 750) {
                spaceshipState.x += 35;
            }
            spaceship.style.left = spaceshipState.x + 'px';
        };

        const init = () => {
            const socket = io.connect('/');
            socket.on('connect', () => {
                console.log(`Connected: ${socket.id}`);

                const url = `https://${window.location.host}/sender.html`;

                const qr = qrcode(0, 'L');
                qr.addData(url);
                qr.make();
                document.getElementById('qr').innerHTML = qr.createSvgTag(4);

                status.textContent = 'Waiting for sender...';
                status.style.color = '#ffa500';
            });

            socket.on('signal', async (data) => {
                console.log(`Received signal from ${data.from}`);
                if (!senderId) {
                    senderId = data.from;
                    status.textContent = 'Sender connected! Establishing peer connection...';
                    status.style.color = '#ffa500';
                    answerPeerOffer(data.signal, socket);
                } else if (peer) {
                    peer.signal(data.signal);
                }
            });

            socket.on('disconnect', () => {
                status.textContent = 'Disconnected';
                status.style.color = '#ff0000';
            });
        };

        const answerPeerOffer = async (offer, socket) => {
            peer = new SimplePeer({
                initiator: false,
                trickleIce: false
            });

            peer.on('signal', data => {
                console.log('Sending answer signal');
                socket.emit('signal', { to: senderId, signal: data });
            });

            peer.on('connect', () => {
                console.log('Peer connected!');
                status.textContent = 'Connected! Press START to begin';
                status.style.color = '#00ff00';
                qrDiv.classList.add('hidden');
                startButton.classList.remove('hidden');
                startButton.disabled = false;
            });

            peer.on('stream', (stream) => {
                // Remote sender camera stream received
                console.log('Received sender camera stream');
                try {
                    playerCamera.srcObject = stream;
                    playerCamera.play().catch(() => { });
                    console.log('Sender camera stream set successfully');
                } catch (error) {
                    console.warn('Failed to set sender camera stream on player camera', error);
                }
            });

            peer.on('data', (data) => {
                try {
                    const command = JSON.parse(data);
                    console.log('Received command:', command);
                    if (command.type === 'playerMove') {
                        moveSpaceship(command.direction);
                    } else if (command.type === 'playerShoot') {
                        shootPlayerBullet();
                    } else if (command.type === 'playerShield') {
                        if (command.active && !spaceshipState.shieldActive && spaceshipState.shieldCooldown === 0) {
                            spaceshipState.shieldActive = true;
                            spaceshipState.shieldTimer = 200; // ~4 seconds at 60fps
                            spaceshipState.shieldCooldown = 10; // ~6 seconds after deactivation
                        } else if (!command.active) {
                            spaceshipState.shieldActive = false;
                            spaceshipState.shieldTimer = 0;
                        }
                    }
                } catch (err) {
                    console.error('Failed to parse command:', err);
                }
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                status.textContent = 'Peer connection error';
                status.style.color = '#ff0000';
            });

            peer.on('close', () => {
                console.log('Peer connection closed');
                status.textContent = 'Peer connection closed';
                status.style.color = '#ff0000';
            });

            peer.signal(offer);
        };

        const renderAliens = () => {
            const container = document.getElementById('alien__container');
            container.innerHTML = '';

            if (!aliens.length) return;

            const rows = Array.from(new Set(aliens.map((alien) => alien.row))).sort((a, b) => a - b);

            rows.forEach((rowIndex) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'alien_row';
                rowDiv.dataset.row = rowIndex;
                rowDiv.style.position = 'absolute';
                rowDiv.style.left = '0';
                rowDiv.style.top = '0';
                rowDiv.style.width = '100%';
                rowDiv.style.height = '100%';

                const aliensInRow = aliens.filter((alien) => alien.row === rowIndex && alien.alive);
                aliensInRow.forEach((alien) => {
                    const alienDiv = document.createElement('div');
                    alienDiv.className = 'alien';
                    alienDiv.style.position = 'absolute';
                    alienDiv.style.left = `${alien.x}px`;
                    alienDiv.style.top = `${alien.y}px`;
                    alienDiv.style.width = `${alien.width}px`;
                    alienDiv.style.height = `${alien.height}px`;
                    alienDiv.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="60" height="55" viewBox="0 0 120 110" fill="none"> 
                        <path d="M10.9091 110H21.8182V99.0002H10.9091V110ZM109.093 110V99.0002H98.1835V110H109.093ZM109.093 44.0002V33.0003H87.2744V10.9998H76.3653V32.9995H65.4562V21.9997H54.5471V10.9998H76.3653V0H43.6372V10.9998H32.7281V32.9995H10.9091V43.9993H0V76.9988H10.9091V87.9986H21.8182V98.9985H32.7273V87.9986H54.5455V109.998H65.4545V87.9986H87.2727V98.9985H98.1818V87.9986H109.091V76.9988H120V43.9993H109.091L109.093 44.0002ZM32.7273 65.9998H21.8182V55H32.7273V65.9998ZM54.5463 65.9998H43.6372V55H54.5463V65.9998ZM76.3645 65.9998H65.4554V55H76.3645V65.9998ZM98.1835 65.9998H87.2744V55H98.1835V65.9998Z" fill="${alien.color}" /> 
                        </svg >`;
                    alienDiv.dataset.id = alien.id;

                    rowDiv.appendChild(alienDiv);
                });

                container.appendChild(rowDiv);
            });
        };

        startButton.addEventListener('click', () => {
            gameStarted = true;
            qrDiv.classList.add('hidden');
            startButton.classList.add('hidden');
            gameArea.classList.remove('hidden');
            status.classList.add('hidden');

            // Initialize game entities
            initializeAliens();
            renderAliens();
            gameLoop();
        });

        playAgainButton.addEventListener('click', () => {
            resetGame();
        });

        window.addEventListener('DOMContentLoaded', init);
    </script>

</body>

</html>
