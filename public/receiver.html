<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceship Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameArea {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #00ff00;
            background: #000;
        }

        #spaceship {
            position: absolute;
            bottom: 30px;
            left: 375px;
            /* center - 25px for 50px width */
            width: 50px;
            height: 30px;
            background: #00ff00;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            transition: left 0.1s ease;
        }

        .status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-family: monospace;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="status" id="status">Waiting for connection...</div>
    <div id="gameArea">
        <div id="spaceship"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const spaceship = document.getElementById('spaceship');
        const gameArea = document.getElementById('gameArea');
        const status = document.getElementById('status');

        let position = 375; // starting left position (center - 25)

        const moveSpaceship = (direction) => {
            if (direction === 'left' && position > 0) {
                position -= 10;
            } else if (direction === 'right' && position < 750) { // 800 - 50 = 750
                position += 10;
            }
            spaceship.style.left = position + 'px';
        };

        const init = () => {
            const socket = io.connect('/');
            socket.on('connect', () => {
                console.log(`Connected: ${socket.id}`);
                status.textContent = 'Connected! Ready for controls';
                status.style.color = '#00ff00';
            });

            socket.on('disconnect', () => {
                status.textContent = 'Disconnected';
                status.style.color = '#ff0000';
            });

            socket.on('playerMove', (direction) => {
                moveSpaceship(direction);
            });

            socket.on('playerShoot', () => {
                console.log('Shoot!');
                // Add shooting logic here later
            });
        };

        init();
    </script>
</body>

</html>
