<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceship Controller</title>
    <link rel="stylesheet" href="./style/sender.css">
</head>

<body>
    <h1>SPACESHIP CONTROLLER</h1>
    <div class="hidden controller" id="controller">
        <button id="shield">SHIELD</button>
        <button id="shoot">SHOOT</button>
    </div>
    <button class="hidden" id="startButton">START GAME</button>
    <button class="hidden" id="playAgain">PLAY AGAIN</button>
    <div class="status" id="status">Connecting...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"
        integrity="sha512-0f7Ahsuvr+/P2btTY4mZIw9Vl23lS6LY/Y7amdkmUg2dqsUF+cTe4QjWvj/NIBHJoGksOiqndKQuI9yzn2hB0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const $shield = document.getElementById('shield');
        const $shoot = document.getElementById('shoot');
        const $status = document.getElementById('status');
        const $startButton = document.getElementById('startButton');
        const $controller = document.getElementById('controller');
        const $playAgain = document.getElementById('playAgain');

        let socket;
        let peer;
        let receiverId;
        let gameStarted = false;
        let localStream;

        let shieldActive = false;
        let shieldCooldown = 0;
        let shootCooldown = 0;

        const init = async () => {
            // Request camera permission immediately
            try {
                console.log('Requesting camera for sender...');
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user' // Front camera for mobile
                    },
                    audio: false
                });
                console.log('Sender camera ready');
            } catch (err) {
                console.error('Failed to get sender camera:', err);
                // Continue without camera - game will still work
            }

            // Request gyroscope
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (event) => {
                    if (gameStarted) {
                        sendCommand({ type: 'gyroscope', gamma: event.gamma });
                    }
                });
                console.log('Gyroscope listener added');
            } else {
                console.warn('DeviceOrientationEvent not supported');
            }

            socket = io.connect('/');
            socket.on('connect', () => {
                console.log(`Connected: ${socket.id}`);
                $status.textContent = 'Searching for receiver...';
                $status.style.borderColor = '#ffa500';
                $status.style.color = '#ffa500';

                initiatePeerConnection();
            });

            socket.on('signal', async (data) => {
                console.log(`Received signal from ${data.from}`);
                if (!receiverId) {
                    receiverId = data.from;
                }
                if (peer) {
                    peer.signal(data.signal);
                }
            });

            socket.on('disconnect', () => {
                $status.textContent = 'Disconnected from server';
                $status.style.borderColor = '#ff0000';
                $status.style.color = '#ff0000';
            });

            const activateShield = () => {
                if (shieldCooldown > 0) return;
                shieldActive = true;
                sendCommand({ type: 'playerShield', active: true });
                $shield.classList.add('active');
            };

            const deactivateShield = () => {
                if (shieldActive) {
                    shieldActive = false;
                    $shield.classList.remove('active');
                    sendCommand({ type: 'playerShield', active: false });
                    shieldCooldown = 12;
                }
            };

            $shield.addEventListener('mousedown', activateShield);
            $shield.addEventListener('mouseup', deactivateShield);
            $shield.addEventListener('mouseleave', deactivateShield);
            $shield.addEventListener('touchstart', (e) => { e.preventDefault(); activateShield(); });
            $shield.addEventListener('touchend', (e) => { e.preventDefault(); deactivateShield(); });

            $shoot.addEventListener('click', () => {
                if (shootCooldown > 0 || shieldActive) return;
                sendCommand({ type: 'playerShoot' });
                shootCooldown = 15;
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ') {
                    e.preventDefault();
                    if (shootCooldown > 0 || shieldActive) return;
                    sendCommand({ type: 'playerShoot' });
                    $shoot.style.transform = 'scale(0.95)';
                    shootCooldown = 15;
                } else if (e.key.toLowerCase() === 's') {
                    e.preventDefault();
                    if (shieldCooldown > 0) return;
                    shieldActive = true;
                    sendCommand({ type: 'playerShield', active: true });
                    $shield.classList.add('active');
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.key === ' ') {
                    $shoot.style.transform = 'scale(1)';
                } else if (e.key.toLowerCase() === 's') {
                    if (shieldActive) {
                        shieldActive = false;
                        $shield.classList.remove('active');
                        sendCommand({ type: 'playerShield', active: false });
                        shieldCooldown = 12;
                    }
                }
            });

            const updateCooldownUI = () => {
                if (shieldCooldown > 0) {
                    $shield.classList.add('cooldown');
                } else {
                    $shield.classList.remove('cooldown');
                }

                if (shootCooldown > 0 || shieldActive) {
                    $shoot.classList.add('cooldown');
                } else {
                    $shoot.classList.remove('cooldown');
                }
            };

            setInterval(() => {
                if (shieldCooldown > 0) {
                    shieldCooldown--;
                }
                if (shootCooldown > 0) {
                    shootCooldown--;
                }
                updateCooldownUI();
            }, 16);

            updateCooldownUI();
        };

        const initiatePeerConnection = () => {
            peer = new SimplePeer({
                initiator: true,
                trickleIce: false,
                stream: localStream // Add camera stream to peer connection
            });

            peer.on('signal', data => {
                console.log('Sending offer signal');
                if (receiverId) {
                    socket.emit('signal', { to: receiverId, signal: data });
                } else {
                    socket.emit('signal', { signal: data });
                }
            });

            peer.on('connect', () => {
                console.log('Peer connected!');
                $status.textContent = 'Connected! Press START to begin';
                $status.style.borderColor = '#00ff00';
                $status.style.color = '#00ff00';
                $startButton.classList.remove('hidden');
                $startButton.disabled = false;
            });

            peer.on('data', (data) => {
                try {
                    const command = JSON.parse(data);
                    console.log('Received command:', command);
                    if (command.type === 'gameOver') {
                        gameStarted = false;
                        $controller.classList.add('hidden');
                        $playAgain.classList.remove('hidden');
                        $status.classList.remove('hidden');
                        $status.textContent = 'Game Over! Press PLAY AGAIN';
                        $status.style.borderColor = '#ff0000';
                        $status.style.color = '#ff0000';
                    }
                } catch (err) {
                    console.error('Failed to parse command:', err);
                }
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                $status.textContent = 'Peer connection error';
                $status.style.borderColor = '#ff0000';
                $status.style.color = '#ff0000';
            });

            peer.on('close', () => {
                console.log('Peer connection closed');
                $status.textContent = 'Peer connection closed';
                $status.style.borderColor = '#ff0000';
                $status.style.color = '#ff0000';
            });
        };

        const sendCommand = (command) => {
            if (peer && peer.connected) {
                peer.send(JSON.stringify(command));
            }
        };

        $startButton.addEventListener('click', () => {
            gameStarted = true;
            $startButton.classList.add('hidden');
            $controller.classList.remove('hidden');
            $status.classList.add('hidden');
            $playAgain.classList.add('hidden');
        });

        $playAgain.addEventListener('click', () => {
            sendCommand({ type: 'resetGame' });
            gameStarted = true;
            $playAgain.classList.add('hidden');
            $controller.classList.remove('hidden');
            $status.classList.add('hidden');
        });

        init();
    </script>
</body>

</html>
