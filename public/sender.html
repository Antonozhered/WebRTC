<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceship Controller</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: Arial, sans-serif;
            color: #20154d;
        }

        h1 {
            color: #e94560;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #e94560;
        }

        .controller {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid #e94560;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        button {
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #0f3460;
            background: #16213e;
            color: #00d4ff;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.1s;
            text-shadow: 0 0 5px #00d4ff;
        }

        button:hover {
            background: #0f3460;
            border-color: #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 0 20px #00d4ff;
        }

        #moveLeft {
            grid-column: 1;
            grid-row: 2;
        }

        #moveRight {
            grid-column: 3;
            grid-row: 2;
        }

        #shoot {
            grid-column: 2;
            grid-row: 3;
            background: #e94560;
            color: #fff;
            text-shadow: 0 0 5px #e94560;
        }

        #shoot:hover {
            background: #ff6b7a;
            border-color: #e94560;
            box-shadow: 0 0 10px #e94560;
        }

        #shoot:active {
            box-shadow: 0 0 20px #e94560;
        }

        .status {
            margin-top: 30px;
            padding: 10px 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 5px;
            color: #00d4ff;
            text-shadow: 0 0 5px #00d4ff;
        }

        .hidden {
            display: none;
        }

        #startButton {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #e94560;
            color: #fff;
            border: 2px solid #ff6b7a;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #startButton:hover {
            background: #ff6b7a;
            box-shadow: 0 0 20px #e94560;
        }

        #startButton:active {
            transform: scale(0.95);
        }

        #startButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <h1>SPACESHIP CONTROLLER</h1>
    <div class="hidden controller" id="controller">
        <button id="moveLeft">← LEFT</button>
        <button id="moveRight">RIGHT →</button>
        <button id="shoot">SHOOT</button>
    </div>
    <button class="hidden" id="startButton">START GAME</button>
    <div class="status" id="status">Connecting...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"
        integrity="sha512-0f7Ahsuvr+/P2btTY4mZIw9Vl23lS6LY/Y7amdkmUg2dqsUF+cTe4QjWvj/NIBHJoGksOiqndKQuI9yzn2hB0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const $moveLeft = document.getElementById('moveLeft');
        const $moveRight = document.getElementById('moveRight');
        const $shoot = document.getElementById('shoot');
        const $status = document.getElementById('status');
        const $startButton = document.getElementById('startButton');
        const $controller = document.getElementById('controller');

        let socket;
        let peer;
        let receiverId;
        let gameStarted = false;
        let localStream;

        const init = async () => {
            // Request camera permission immediately
            try {
                console.log('Requesting camera for sender...');
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user' // Front camera for mobile
                    },
                    audio: false
                });
                console.log('Sender camera ready');
            } catch (err) {
                console.error('Failed to get sender camera:', err);
                // Continue without camera - game will still work
            }

            socket = io.connect('/');
            socket.on('connect', () => {
                console.log(`Connected: ${socket.id}`);
                $status.textContent = 'Searching for receiver...';
                $status.style.borderColor = '#ffa500';
                $status.style.color = '#ffa500';

                initiatePeerConnection();
            });

            socket.on('signal', async (data) => {
                console.log(`Received signal from ${data.from}`);
                if (!receiverId) {
                    receiverId = data.from;
                }
                if (peer) {
                    peer.signal(data.signal);
                }
            });

            socket.on('disconnect', () => {
                $status.textContent = 'Disconnected from server';
                $status.style.borderColor = '#ff0000';
                $status.style.color = '#ff0000';
            });

            $moveLeft.addEventListener('click', () => {
                sendCommand({ type: 'playerMove', direction: 'left' });
            });

            $moveRight.addEventListener('click', () => {
                sendCommand({ type: 'playerMove', direction: 'right' });
            });

            $shoot.addEventListener('click', () => {
                sendCommand({ type: 'playerShoot' });
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') {
                    sendCommand({ type: 'playerMove', direction: 'left' });
                    $moveLeft.style.transform = 'scale(0.95)';
                } else if (e.key === 'ArrowRight') {
                    sendCommand({ type: 'playerMove', direction: 'right' });
                    $moveRight.style.transform = 'scale(0.95)';
                } else if (e.key === ' ') {
                    e.preventDefault();
                    sendCommand({ type: 'playerShoot' });
                    $shoot.style.transform = 'scale(0.95)';
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft') {
                    $moveLeft.style.transform = 'scale(1)';
                } else if (e.key === 'ArrowRight') {
                    $moveRight.style.transform = 'scale(1)';
                } else if (e.key === ' ') {
                    $shoot.style.transform = 'scale(1)';
                }
            });
        };

        const initiatePeerConnection = () => {
            peer = new SimplePeer({
                initiator: true,
                trickleIce: false,
                stream: localStream // Add camera stream to peer connection
            });

            peer.on('signal', data => {
                console.log('Sending offer signal');
                if (receiverId) {
                    socket.emit('signal', { to: receiverId, signal: data });
                } else {
                    socket.emit('signal', { signal: data });
                }
            });

            peer.on('connect', () => {
                console.log('Peer connected!');
                $status.textContent = 'Connected! Press START to begin';
                $status.style.borderColor = '#00ff00';
                $status.style.color = '#00ff00';
                $startButton.classList.remove('hidden');
                $startButton.disabled = false;
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                $status.textContent = 'Peer connection error';
                $status.style.borderColor = '#ff0000';
                $status.style.color = '#ff0000';
            });

            peer.on('close', () => {
                console.log('Peer connection closed');
                $status.textContent = 'Peer connection closed';
                $status.style.borderColor = '#ff0000';
                $status.style.color = '#ff0000';
            });
        };

        const sendCommand = (command) => {
            if (peer && peer.connected) {
                peer.send(JSON.stringify(command));
            }
        };

        $startButton.addEventListener('click', () => {
            gameStarted = true;
            $startButton.classList.add('hidden');
            $controller.classList.remove('hidden');
            $status.classList.add('hidden');
        });

        init();
    </script>
</body>

</html>
